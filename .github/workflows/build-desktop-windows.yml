name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "desktop-app/**"
      - ".github/workflows/build-desktop-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri -> target
      - name: Install frontend dependencies
        run: npm ci --registry=https://registry.npmjs.org/
      - name: Verify project
        run: npm run verify
      - name: Build Windows app
        run: npm run desktop:build
      - uses: actions/upload-artifact@v7
        with:
          name: 山海经原典地图研究台-Windows-build-${{ github.run_number }}
          path: |
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe
            desktop-app/src-tauri/target/release/shj-map-desktop.exe
          if-no-files-found: error
