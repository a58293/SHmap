name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    paths:
      - "desktop-app/**"
      - ".github/workflows/build-desktop-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri -> target
      - run: npm ci
      - run: npm run verify
      - run: npm run desktop:build
      - uses: actions/upload-artifact@v4
        with:
          name: 山海经原典地图研究台-Windows-v001
          path: |
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe
            desktop-app/src-tauri/target/release/shj-map-desktop.exe
          if-no-files-found: error
