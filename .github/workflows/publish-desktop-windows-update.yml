name: Publish Windows Desktop Update

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri -> target
      - name: Install frontend dependencies
        working-directory: desktop-app
        run: npm ci --registry=https://registry.npmjs.org/
      - name: Verify project
        working-directory: desktop-app
        run: npm run verify
      - name: Verify release tag and version
        working-directory: desktop-app
        run: node scripts/verify-release-tag.mjs
      - name: Read release notes
        id: release_notes
        shell: pwsh
        run: |
          $body = Get-Content "desktop-app/RELEASE_NOTES.md" -Raw
          "body<<RELEASE_BODY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "RELEASE_BODY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop-app
          tagName: desktop-v__VERSION__
          releaseName: 山海经原典地图研究台 v__VERSION__
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json
